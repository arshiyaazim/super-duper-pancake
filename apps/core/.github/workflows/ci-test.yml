name: CI — Test Suite

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_DB: fazle_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.3.0

      - name: Run ruff check
        run: ruff check app/ modules/
        working-directory: core/

  # ─── Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: core/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ \
            -m unit \
            --timeout=30 \
            --cov=app --cov=modules \
            --cov-report=xml:tests/coverage-unit.xml \
            --cov-report=term-missing \
            -v
        env:
          ENVIRONMENT: test
          INTERNAL_API_KEY: test-internal-key
          ADMIN_NUMBERS: "8801700000001"
          META_VERIFY_TOKEN: test_verify_token

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: core/tests/coverage-unit.xml

  # ─── Integration + DB Tests ──────────────────────────────────────────────
  integration-tests:
    name: Integration + DB Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: core/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run integration + DB tests
        run: |
          python -m pytest tests/integration/ tests/db/ tests/workflows/ \
            -m "integration or db or workflow" \
            --timeout=60 \
            --cov=app --cov=modules \
            --cov-report=xml:tests/coverage-integration.xml \
            --cov-report=term-missing \
            -v
        env:
          ENVIRONMENT: test
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fazle_test"
          INTERNAL_API_KEY: test-internal-key
          ADMIN_NUMBERS: "8801700000001"
          META_VERIFY_TOKEN: test_verify_token
          BRIDGE1_URL: "http://mock-bridge1"
          BRIDGE2_URL: "http://mock-bridge2"
          OLLAMA_BASE_URL: "http://mock-ollama"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: core/tests/coverage-integration.xml

  # ─── Resilience Tests ────────────────────────────────────────────────────
  resilience-tests:
    name: Resilience Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: core/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run resilience tests
        run: |
          python -m pytest tests/resilience/ \
            -m resilience \
            --timeout=60 \
            -v
        env:
          ENVIRONMENT: test
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fazle_test"
          INTERNAL_API_KEY: test-internal-key
          ADMIN_NUMBERS: "8801700000001"
          META_VERIFY_TOKEN: test_verify_token

  # ─── Coverage Report ─────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Combine coverage reports
        run: |
          coverage combine coverage/coverage-unit.xml coverage/coverage-integration.xml || true
          echo "Coverage files:"
          ls -la coverage/

      - name: Upload to Codecov (optional)
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage/coverage-unit.xml,coverage/coverage-integration.xml
          fail_ci_if_error: false

  # ─── E2E Tests (optional, requires running app) ──────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'  # Only on main branch

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: core/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start app in background
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8200 &
          sleep 5
          curl -fs http://127.0.0.1:8200/health
        env:
          ENVIRONMENT: test
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fazle_test"
          INTERNAL_API_KEY: test-internal-key
          ADMIN_NUMBERS: "8801700000001"
          META_VERIFY_TOKEN: test_verify_token

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ \
            -m e2e \
            --timeout=60 \
            -v
        env:
          TEST_APP_URL: "http://127.0.0.1:8200"
          TEST_API_KEY: test-internal-key
