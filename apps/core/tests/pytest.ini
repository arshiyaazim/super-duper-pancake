[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -q
timeout = 30

markers =
    unit: Pure unit tests (no I/O)
    integration: API integration tests (requires test DB)
    db: Database consistency tests (requires test DB)
    workflow: End-to-end workflow simulation
    load: Load / stress tests
    resilience: Failure recovery tests
    e2e: Playwright browser tests (slow)
    slow: Slower tests (>5s each)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestDeprecationWarning
