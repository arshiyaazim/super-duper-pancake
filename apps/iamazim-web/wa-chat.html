<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Chat — Al-Aqsa Admin</title>
<link rel="stylesheet" href="admin.css">
<style>
.chat-layout {
  display: grid;
  grid-template-columns: 300px 1fr 300px;
  gap: 0;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* Mobile: bottom tab switcher for chat panels */
.mobile-chat-tabs {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray);
  z-index: 90;
  height: 56px;
  align-items: stretch;
}

.mobile-chat-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  border: none;
  background: none;
  cursor: pointer;
  gap: 3px;
  transition: color .15s;
}

.mobile-chat-tab .tab-icon { font-size: 18px; }
.mobile-chat-tab.active { color: var(--gold); }

@media (max-width: 768px) {
  .chat-layout {
    display: block;
    height: calc(100vh - 56px - 56px); /* topbar + bottom tabs */
    overflow: hidden;
    position: relative;
  }

  .contacts-panel,
  .msg-panel,
  .drafts-panel {
    position: absolute;
    inset: 0;
    display: none !important;
    width: 100%;
    height: 100%;
  }

  .contacts-panel.mobile-active,
  .msg-panel.mobile-active,
  .drafts-panel.mobile-active {
    display: flex !important;
  }

  .mobile-chat-tabs { display: flex; }

  .topbar { height: auto; min-height: 56px; }
  .topbar-right .tabs { display: none; }

  .msg-composer { position: sticky; bottom: 56px; }
}

/* Contacts panel */
.contacts-panel {
  border-right: 1px solid var(--gray);
  background: var(--white);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-head {
  padding: 16px;
  border-bottom: 1px solid var(--gray);
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.contact-search { padding: 10px 12px; border-bottom: 1px solid var(--gray); }

.contact-list { flex: 1; overflow-y: auto; }

.contact-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--gray);
  transition: background .1s;
}

.contact-item:hover { background: var(--off-white); }
.contact-item.active { background: #fef3c7; border-left: 3px solid var(--gold); }

.contact-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy2), var(--navy3));
  color: var(--white);
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-info { flex: 1; min-width: 0; }

.contact-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  truncate: true;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.contact-phone {
  font-size: 11px;
  color: var(--muted);
}

/* Message thread */
.msg-panel {
  display: flex;
  flex-direction: column;
  background: #f1f4f9;
  overflow: hidden;
}

.msg-head {
  background: var(--white);
  border-bottom: 1px solid var(--gray);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.msg-thread {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-bubble {
  max-width: 72%;
  padding: 9px 13px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.5;
  word-wrap: break-word;
}

.msg-bubble.inbound {
  background: var(--white);
  color: var(--text);
  border-bottom-left-radius: 3px;
  align-self: flex-start;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.msg-bubble.outbound {
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  color: var(--white);
  border-bottom-right-radius: 3px;
  align-self: flex-end;
}

.msg-ts {
  font-size: 10px;
  margin-top: 3px;
  opacity: .65;
}

.msg-composer {
  background: var(--white);
  border-top: 1px solid var(--gray);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.msg-composer textarea {
  flex: 1;
  resize: none;
  border: 1.5px solid var(--gray2);
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 13.5px;
  font-family: inherit;
  max-height: 120px;
  min-height: 42px;
}

.msg-composer textarea:focus {
  outline: none;
  border-color: var(--gold);
}

/* Drafts panel */
.drafts-panel {
  border-left: 1px solid var(--gray);
  background: var(--white);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.draft-list { flex: 1; overflow-y: auto; }

.draft-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--gray);
  font-size: 12.5px;
}

.draft-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
}

.draft-phone { font-weight: 700; color: var(--navy); font-size: 12px; }
.draft-body  { color: var(--text); margin-bottom: 6px; line-height: 1.4; }

.draft-actions { display: flex; gap: 5px; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <a href="admin.html" class="brand">
      <div class="logo-icon">A</div>
      <div class="brand-text">
        <span class="brand-name">Al-Aqsa Admin</span>
        <span class="brand-sub">Security Services</span>
      </div>
    </a>
  </div>
  <div class="sidebar-nav"></div>
  <div class="sidebar-footer">
    <div class="sidebar-status">
      <span class="status-dot"></span>
      <span>WhatsApp Chat</span>
    </div>
  </div>
</nav>

<div class="main" style="overflow:hidden">
  <header class="topbar">
    <div class="page-title">WhatsApp Chat</div>
    <div class="topbar-right">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('bridge1',this)">Bridge 1 (HR)</button>
        <button class="tab" onclick="switchTab('bridge2',this)">Bridge 2 (OPS)</button>
        <button class="tab" onclick="switchTab('meta',this)">Meta</button>
      </div>
      <button class="refresh-btn" onclick="loadContacts()">↺</button>
    </div>
  </header>

  <div class="chat-layout">

    <!-- Contacts -->
    <div class="contacts-panel">
      <div class="panel-head">
        Contacts
        <span id="contact-count" class="badge badge-gray">0</span>
      </div>
      <div class="contact-search">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search name or phone…" id="contact-search" oninput="filterContacts()">
        </div>
      </div>
      <div class="contact-list" id="contact-list">
        <div class="loading-block"><span class="spinner"></span> Loading…</div>
      </div>
    </div>

    <!-- Message thread -->
    <div class="msg-panel">
      <div class="msg-head" id="msg-head">
        <div class="contact-avatar" id="msg-avatar">?</div>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--navy)" id="msg-name">Select a contact</div>
          <div class="text-muted" id="msg-phone"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="blockContact()" id="btn-block" style="display:none">Block</button>
        </div>
      </div>
      <div class="msg-thread" id="msg-thread">
        <div class="empty-state">
          <div class="icon">💬</div>
          <p>Select a contact to view messages</p>
        </div>
      </div>
      <div class="msg-composer" id="msg-composer" style="display:none">
        <textarea id="msg-input" rows="1" placeholder="Type a message…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
        <button class="btn btn-gold" onclick="sendMsg()">Send ▸</button>
      </div>
    </div>

    <!-- Drafts queue -->
    <div class="drafts-panel">
      <div class="panel-head">
        Pending Drafts
        <span id="draft-count" class="badge badge-gold">0</span>
      </div>
      <div class="draft-list" id="draft-list">
        <div class="loading-block"><span class="spinner"></span></div>
      </div>
    </div>

  </div>
</div>

<!-- Mobile bottom tab bar -->
<div class="mobile-chat-tabs" id="mobile-chat-tabs">
  <button class="mobile-chat-tab active" id="mct-contacts" onclick="mobileSwitchPanel('contacts',this)">
    <span class="tab-icon">👥</span>Contacts
  </button>
  <button class="mobile-chat-tab" id="mct-chat" onclick="mobileSwitchPanel('chat',this)">
    <span class="tab-icon">💬</span>Chat
  </button>
  <button class="mobile-chat-tab" id="mct-drafts" onclick="mobileSwitchPanel('drafts',this)">
    <span class="tab-icon">📋</span>Drafts
    <span id="m-draft-badge" style="position:absolute;top:6px;right:calc(50% - 28px);background:var(--gold);color:var(--navy);font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px"></span>
  </button>
</div>

<!-- Edit draft modal -->
<div id="edit-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Edit Draft</span>
      <button class="modal-close" onclick="closeModal('edit-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea class="form-textarea" id="edit-body" style="min-height:140px"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-gold" onclick="submitEditDraft()">Save &amp; Approve</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
renderNav('wa-chat.html');

let currentPhone = null;
let currentBridge = 'bridge1';
let allContacts = [];
let editingDraftId = null;

function switchTab(bridge, btn) {
  currentBridge = bridge;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadContacts();
}

async function loadContacts() {
  const cl = document.getElementById('contact-list');
  cl.innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading…</div>';
  try {
    const data = await fazleGet('/api/wa/contacts?limit=200&bridge=' + currentBridge);
    allContacts = data.contacts || data || [];
    renderContacts(allContacts);
    document.getElementById('contact-count').textContent = allContacts.length;
  } catch (e) {
    cl.innerHTML = `<div class="alert alert-error" style="margin:12px">${e.message}</div>`;
  }
  loadDrafts();
}

function renderContacts(contacts) {
  const cl = document.getElementById('contact-list');
  if (!contacts.length) {
    cl.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>No contacts</p></div>';
    return;
  }
  cl.innerHTML = contacts.map(c => {
    const name = c.display_name || c.name || c.phone;
    const initial = (name || '?')[0].toUpperCase();
    return `
      <div class="contact-item${c.phone === currentPhone ? ' active' : ''}"
           onclick="selectContact('${c.phone}','${escHtml(name)}')">
        <div class="contact-avatar">${initial}</div>
        <div class="contact-info">
          <div class="contact-name">${escHtml(name)}</div>
          <div class="contact-phone">${c.phone}</div>
        </div>
        ${c.role ? `<span class="badge badge-navy" style="font-size:10px">${c.role}</span>` : ''}
      </div>
    `;
  }).join('');
}

function filterContacts() {
  const q = document.getElementById('contact-search').value.toLowerCase();
  renderContacts(allContacts.filter(c =>
    (c.display_name || c.name || '').toLowerCase().includes(q) ||
    (c.phone || '').includes(q)
  ));
}

async function selectContact(phone, name) {
  currentPhone = phone;
  document.getElementById('msg-name').textContent = name;
  document.getElementById('msg-phone').textContent = phone;
  document.getElementById('msg-avatar').textContent = (name || '?')[0].toUpperCase();
  document.getElementById('btn-block').style.display = '';
  document.getElementById('msg-composer').style.display = 'flex';
  // On mobile, switch to chat panel
  if (window.innerWidth <= 768) {
    mobileSwitchPanel('chat', document.getElementById('mct-chat'));
  }

  // Re-render contacts list to update active
  renderContacts(allContacts.filter(c =>
    document.getElementById('contact-search').value ? c : true
  ));

  const thread = document.getElementById('msg-thread');
  thread.innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading…</div>';
  try {
    const data = await fazleGet(`/api/wa/messages/${phone}?limit=50`);
    const msgs = data.messages || data || [];
    if (!msgs.length) {
      thread.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>No messages yet</p></div>';
      return;
    }
    thread.innerHTML = msgs.map(m => `
      <div>
        <div class="msg-bubble ${m.is_from_me || m.direction === 'out' ? 'outbound' : 'inbound'}">
          ${escHtml(m.content || m.body || m.text || '')}
          <div class="msg-ts">${fmtDate(m.timestamp || m.created_at)}</div>
        </div>
      </div>
    `).join('');
    thread.scrollTop = thread.scrollHeight;
  } catch (e) {
    thread.innerHTML = `<div class="alert alert-error" style="margin:12px">${e.message}</div>`;
  }
}

async function sendMsg() {
  if (!currentPhone) return;
  const inp = document.getElementById('msg-input');
  const body = inp.value.trim();
  if (!body) return;
  try {
    await fazlePost('/api/wa/send', {
      phone: currentPhone,
      message: body,
      bridge: currentBridge
    });
    inp.value = '';
    toast('Message sent', 'ok');
    selectContact(currentPhone, document.getElementById('msg-name').textContent);
  } catch (e) {
    toast('Send failed: ' + e.message, 'error');
  }
}

async function blockContact() {
  if (!currentPhone) return;
  if (!confirm(`Block ${currentPhone}?`)) return;
  try {
    await fazlePost(`/api/wa/contacts/${currentPhone}/block`, {});
    toast('Contact blocked', 'ok');
    loadContacts();
  } catch (e) {
    toast('Block failed: ' + e.message, 'error');
  }
}

async function loadDrafts() {
  const dl = document.getElementById('draft-list');
  try {
    const data = await fazleGet('/api/wa/drafts?status=pending&limit=50');
    const drafts = data.drafts || data || [];
    document.getElementById('draft-count').textContent = drafts.length;
    const mb = document.getElementById('m-draft-badge');
    if (mb) mb.textContent = drafts.length > 0 ? drafts.length : '';
    if (!drafts.length) {
      dl.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>No pending drafts</p></div>';
      return;
    }
    dl.innerHTML = drafts.map(d => `
      <div class="draft-item">
        <div class="draft-header">
          <span class="draft-phone">${d.recipient_phone || d.phone || '—'}</span>
          ${statusBadge(d.status || 'pending')}
        </div>
        <div class="draft-body">${escHtml((d.draft_body || d.body || '').slice(0, 120))}${(d.draft_body||d.body||'').length > 120 ? '…' : ''}</div>
        <div class="draft-actions">
          <button class="btn btn-sm btn-gold" onclick="approveDraft('${d.id}')">✓ Approve</button>
          <button class="btn btn-sm btn-outline" onclick="openEditDraft('${d.id}','${escHtml(d.draft_body||d.body||'')}')">✎ Edit</button>
          <button class="btn btn-sm btn-danger" onclick="rejectDraft('${d.id}')">✗</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    dl.innerHTML = `<div class="alert alert-error" style="margin:12px">${e.message}</div>`;
  }
}

async function approveDraft(id) {
  try {
    await fazlePost(`/api/wa/drafts/${id}/approve`, {});
    toast('Draft approved & sent', 'ok');
    loadDrafts();
  } catch (e) {
    toast('Approve failed: ' + e.message, 'error');
  }
}

async function rejectDraft(id) {
  try {
    await fazlePost(`/api/wa/drafts/${id}/reject`, {});
    toast('Draft rejected', 'warn');
    loadDrafts();
  } catch (e) {
    toast('Reject failed: ' + e.message, 'error');
  }
}

function openEditDraft(id, body) {
  editingDraftId = id;
  document.getElementById('edit-body').value = body;
  openModal('edit-modal');
}

async function submitEditDraft() {
  const body = document.getElementById('edit-body').value.trim();
  if (!body) return;
  try {
    await fazlePost(`/api/wa/drafts/${editingDraftId}/edit`, { body });
    await fazlePost(`/api/wa/drafts/${editingDraftId}/approve`, {});
    closeModal('edit-modal');
    toast('Draft edited & sent', 'ok');
    loadDrafts();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Mobile panel switching */
function mobileSwitchPanel(panel, btn) {
  const panels = {
    contacts: document.querySelector('.contacts-panel'),
    chat:     document.querySelector('.msg-panel'),
    drafts:   document.querySelector('.drafts-panel'),
  };
  Object.values(panels).forEach(p => p && p.classList.remove('mobile-active'));
  if (panels[panel]) panels[panel].classList.add('mobile-active');
  document.querySelectorAll('.mobile-chat-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function initMobileChat() {
  if (window.innerWidth <= 768) {
    document.querySelector('.contacts-panel')?.classList.add('mobile-active');
  }
}

/* Override selectContact to switch to chat panel on mobile */
const _origSelect = selectContact;
// Re-assign after DOMContentLoaded

document.addEventListener('DOMContentLoaded', () => {
  renderNav('wa-chat.html');
  initMobileChat();
  loadContacts();
  setInterval(loadDrafts, 15000);
});
</script>
</body>
</html>
