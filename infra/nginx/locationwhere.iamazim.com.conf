server {
    server_name locationwhere.iamazim.com;

    root /home/azim/location_where/admin-dashboard/dist;
    index index.html;

    # Health endpoint - proxy to backend
    location /health {
        proxy_pass http://127.0.0.1:8310;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Downloads directory - serve static files
    location /downloads/ {
        alias /var/www/locationwhere.iamazim.com/downloads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API routes - proxy to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8310;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback - must be LAST location block
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide dot files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/locationwhere.iamazim.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/locationwhere.iamazim.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = locationwhere.iamazim.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name locationwhere.iamazim.com;
    return 404; # managed by Certbot
}
