# ============================================================
# Nginx — api.iamazim.com (Dedicated API Subdomain → Fazle API)
# Updated: 2026-04-17 — migrated from Dograh to Fazle
# ============================================================

limit_req_zone $binary_remote_addr zone=api_sub_limit:10m rate=30r/s;

upstream fazle_api_sub {
    least_conn;
    include /etc/nginx/upstreams/fazle-api.conf;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.iamazim.com;

    ssl_certificate /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (non-CORS only; FastAPI handles CORS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ── Block API documentation (production) ────────────────
    location = /docs {
        return 404;
    }

    location = /redoc {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

# DISABLED:     # ── WBOM routes ─────────────────────────────────────────
# DISABLED:     location /api/wbom/ {
# DISABLED:         limit_req zone=api_sub_limit burst=50 nodelay;
# DISABLED: 
# DISABLED:         proxy_pass http://127.0.0.1:9900/api/wbom/;
# DISABLED:         proxy_http_version 1.1;
# DISABLED:         proxy_set_header Host $host;
# DISABLED:         proxy_set_header X-Real-IP $remote_addr;
# DISABLED:         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# DISABLED:         proxy_set_header X-Forwarded-Proto $scheme;
# DISABLED:         proxy_read_timeout 60s;
# DISABLED:     }

    # ── All API traffic ─────────────────────────────────────
    location / {
        limit_req zone=api_sub_limit burst=50 nodelay;

        proxy_pass http://fazle_api_sub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
