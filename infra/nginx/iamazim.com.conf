# ============================================================
# Nginx — iamazim.com (Al-Aqsa Security Company Website)
# Updated: 2026-06-04 — replaced fazle-core proxy with static
#                        company website. /api/fazle/ still proxied.
# ============================================================

limit_req_zone $binary_remote_addr zone=main_limit:10m rate=20r/s;

upstream fazle_api_main {
    least_conn;
    include /etc/nginx/upstreams/fazle-api.conf;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name iamazim.com www.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://iamazim.com$request_uri;
    }
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.iamazim.com;

    ssl_certificate     /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://iamazim.com$request_uri;
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iamazim.com;

    ssl_certificate     /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 10M;

    # ── Static website root ─────────────────────────────────
    root  /var/www/iamazim.com;
    index index.html;

    # ── Legal static pages ──────────────────────────────────
    location /legal/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Static assets caching ───────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /api/v1/twilio/ {
        limit_req zone=main_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8310/api/v1/twilio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Fazle API routes (for future portal integration) ────
    location /api/fazle/ {
        limit_req zone=main_limit burst=30 nodelay;

        proxy_pass http://fazle_api_main/fazle/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (pass through to fazle-core) ───────────
    location /health {
        proxy_pass http://fazle_api_main/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block API docs ───────────────────────────────────────
    location /docs        { deny all; return 404; }
    location /openapi.json { deny all; return 404; }
    location /redoc       { deny all; return 404; }

    # ── Block hidden paths ───────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── SPA fallback — serve index.html for all other paths ─
    location / {
        limit_req zone=main_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
