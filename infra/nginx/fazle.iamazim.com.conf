# ============================================================
# Nginx — fazle.iamazim.com
# Backend: fazle-core (systemd) on 127.0.0.1:8200
# ============================================================

limit_req_zone $binary_remote_addr zone=fazle_limit:10m rate=20r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name fazle.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fazle.iamazim.com;

    ssl_certificate /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 50M;

    # ── Logging: separate error log + 5xx access log for monitoring ─────────────
    access_log /var/log/nginx/fazle.access.log combined;
    error_log  /var/log/nginx/fazle.error.log warn;

    # ── Meta WhatsApp webhook (two accepted paths) ───────────────────────────
    location /webhook/meta {
        limit_req zone=fazle_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:8200/webhook/meta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /api/fazle/social/whatsapp/webhook {
        limit_req zone=fazle_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:8200/webhook/meta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── API routes (/api/fazle/xxx → fazle-core /xxx) ────────────────────────
    location /api/fazle/ {
        limit_req zone=fazle_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:8200/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8200/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block API docs in production ─────────────────────────────────────────
    location /docs {
        deny all;
        return 404;
    }

    location /openapi.json {
        deny all;
        return 404;
    }

    # ── FPE Payroll Dashboard (SPA) ──────────────────────────────────────────
    location = /payroll {
        proxy_pass http://127.0.0.1:8200/payroll;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── AI chat + agent endpoints — longer timeout for Ollama/Claude inference ─
    # /admin/chat was the old name (dead); real endpoint is /chat/message.
    # /agent/chat streams Claude via SSE and also needs a long window.
    location ~ ^/(chat|agent)/ {
        limit_req zone=fazle_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        # Required for SSE streaming (agent chat)
        proxy_buffering off;
        proxy_cache off;
    }

    # ── WhatsApp Chat UI — SSE stream (must not buffer, needs long timeout) ──
    location = /api/wa/stream {
        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        # No rate limit — SSE is one persistent connection per browser tab
    }

    # ── WhatsApp Chat API — generous burst for dashboard page load ────────────
    location /api/wa/ {
        limit_req zone=fazle_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Dashboard + all other routes → fazle-core ────────────────────────────
    location / {
        limit_req zone=fazle_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Block hidden paths ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
