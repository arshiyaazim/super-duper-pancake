# ============================================================
# Nginx — vscode.iamazim.com → code-server (VS Code in Browser)
# Created: 2026-04-24 | SSL managed by Certbot
# ============================================================

limit_req_zone $binary_remote_addr zone=vscode_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=vscode_general:10m rate=30r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vscode.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → code-server proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vscode.iamazim.com;

    ssl_certificate /etc/letsencrypt/live/vscode.iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vscode.iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket support (required for VS Code terminal + live editing)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;

    location / {
        limit_req zone=vscode_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:8443;
    }
}
